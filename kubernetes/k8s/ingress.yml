apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cohort-app
  labels:
    app.kubernetes.io/name: cohort-app
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: "/"
            pathType: Prefix
            backend:
              service:
                name: main-server-service
                port:
                  number: 80
          - path: "/api/product"
            pathType: Prefix
            backend:
              service:
                name: product-server-service
                port:
                  number: 80